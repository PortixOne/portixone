<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>PortixOne — Quickstart</title>
  </head>
  <body>
    <h1>PortixOne Quickstart</h1>
    <p>Runtime must be running (<code>npm run dev</code> in <code>runtime/</code>).</p>

    <label>
      API key
      <input id="apiKey" type="text" value="dev-local-key" />
    </label>
    <br /><br />
    <button id="printBtn">Print test ticket</button>
    <button id="statusBtn">Check status</button>

    <pre id="output"></pre>

    <!--
      Plain HTML has no bundler to resolve npm package names, so this import
      map stands in for one — point it at your own node_modules in a real app.
    -->
    <script type="importmap">
      {
        "imports": {
          "@portixone/protocol": "../../packages/protocol/dist/index.js",
          "@portixone/shared": "../../packages/shared/dist/index.js",
          "zod": "https://esm.sh/zod@3.25.76"
        }
      }
    </script>
    <script type="module">
      import { Portix } from '../../sdk-js/dist/index.js';

      const output = document.getElementById('output');
      const log = (label, data) => {
        output.textContent = `${label}\n${JSON.stringify(data, null, 2)}\n\n` + output.textContent;
      };

      const connect = () => {
        const apiKey = document.getElementById('apiKey').value;
        return new Portix({ apiKey });
      };

      document.getElementById('printBtn').addEventListener('click', async () => {
        try {
          const portix = connect();
          await portix.connect();
          const result = await portix.print({ content: 'Test ticket from PortixOne' });
          log('print() ok', result);
        } catch (error) {
          log('print() failed', { message: error.message });
        }
      });

      document.getElementById('statusBtn').addEventListener('click', async () => {
        try {
          const portix = connect();
          await portix.connect();
          const status = await portix.getStatus();
          log('getStatus() ok', status);
        } catch (error) {
          log('getStatus() failed', { message: error.message });
        }
      });
    </script>
  </body>
</html>
